name: CD Staging
on:
  push:
    branches: [staging]
concurrency:
  group: laborics-staging-deploy
  cancel-in-progress: false
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd /opt/laborics-staging
            git pull origin staging || exit 1
            npm install || exit 1
            npm run build || exit 1
            sudo systemctl restart laborics-web-staging
            sleep 5
            curl -sf http://localhost:4003/health || exit 1
