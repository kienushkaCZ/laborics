name: CD Dev
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [dev]
jobs:
  deploy-dev:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to dev
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 3m
          script: |
            cd /opt/laborics-dev
            git pull origin dev || exit 1
            npm install || exit 1
            npm run build || exit 1
            sudo systemctl restart laborics-web-dev
            sleep 5
            curl -sf http://localhost:4002/health || exit 1
