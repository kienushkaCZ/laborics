name: Promote Dev to Staging
on:
  workflow_run:
    workflows: ["CD Dev"]
    types: [completed]
    branches: [dev]
jobs:
  promote:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge exact deployed SHA into staging
        env:
          DEPLOYED_SHA: ${{ github.event.workflow_run.head_sha }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout staging
          git merge "$DEPLOYED_SHA" --no-edit || {
            curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=⚠️ STAGING | laborics: dev→staging merge conflict (SHA: ${DEPLOYED_SHA:0:8})"
            exit 1
          }
          git push origin staging
